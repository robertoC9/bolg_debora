# Render Blueprint — Blog de Débora Backend
services:
  - type: web
    name: debbie-blog-api
    runtime: node
    region: oregon
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: debbie-blog-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://debbie-blog.onrender.com
      - key: JWT_EXPIRES_IN
        value: 7d

databases:
  - name: debbie-blog-db
    databaseName: debbie_blog
    user: debbie_blog_user
    plan: free
    region: oregon
